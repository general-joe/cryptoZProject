<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CryptoZ Navbar</title>
    <link rel="stylesheet" href="./style.css" />
  </head>

  <body>
    <header class="header">
      <nav class="navbar">
        <!-- LEFT SIDE -->
        <div class="nav-left">
          <img
            src="./assets/vuesax/bold/nexo-(nexo).png"
            alt="nexo logo"
            class="logo-icon"
          />
          <!-- TEXT LOGO -->
          <h1 class="logo-text">Crypto<span>Z</span></h1>
        </div>

        <!-- CENTER LINKS -->
        <ul class="nav-links">
          <li><a href="#">Products</a></li>
          <li><a href="#">Price</a></li>
          <li><a href="#">Learn</a></li>
          <li><a href="#">Support</a></li>
        </ul>

        <!-- RIGHT SIDE -->
        <div class="nav-right">
          <a href="#" class="signin">Sign in</a>
          <button class="btn-primary">Get started</button>

          <!-- HAMBURGER -->
          <div class="menu-toggle" id="menu-toggle">
            <span></span>
            <span></span>
            <span></span>
          </div>
        </div>
      </nav>

      <!-- MOBILE MENU -->
      <div class="mobile-menu" id="mobile-menu">
        <a href="#">Products</a>
        <a href="#">Price</a>
        <a href="#">Learn</a>
        <a href="#">Support</a>
      </div>
    </header>
    <main>
      <section class="hero">
        <div class="hero-orbit orbit-one"></div>
        <div class="hero-orbit orbit-two"></div>
        <div class="hero-orbit orbit-three"></div>

        <div class="hero-container">
          <article class="hero-content">
            <h1>
              Your all-in-one platform
              <br />
              to buy, sell, trade, and
              <br />
              earn Cryptocurrencies
            </h1>

            <p>
              Open a free account in minutes right from your phone and make your
              money go further
            </p>

            <form class="hero-form">
              <input type="email" placeholder="Email Address...." />
              <button type="submit">Get started</button>
            </form>
          </article>

          <article class="hero-panel">
            <img
              src="/assets/coin/bitCoin/Cam2.png"
              class="hero-coin hero-coin-top"
              alt="Bitcoin coin"
            />
            <img
              src="/assets/coin/ethereum/Cam1.png"
              class="hero-coin hero-coin-bottom"
              alt="Ethereum coin"
            />

            <div class="converter-card">
              <h2>Currency Converter</h2>

              <div class="converter-group">
                <label for="amount-value">Amount</label>
                <div class="converter-field">
                  <div class="currency-chip">
                    <img src="/assets/images/Frame 8764.png" alt="GBP flag" />
                    <span>GBP</span>
                    <span class="currency-arrow">&#709;</span>
                  </div>
                  <input id="amount-value" type="text" value="0.0088" />
                </div>
              </div>

              <div class="converter-group">
                <label for="converted-value">Converted to</label>
                <div class="converter-field">
                  <div class="currency-chip">
                    <img src="/assets/images/Frame 8769.png" alt="AUD flag" />
                    <span>AUD</span>
                    <span class="currency-arrow">&#709;</span>
                  </div>
                  <input id="converted-value" type="text" value="0.0088" />
                </div>
              </div>

              <div class="converter-group">
                <label for="date-value">Date</label>
                <div class="converter-field converter-date">
                  <button class="date-nav" type="button">&#8249;</button>
                  <input id="date-value" type="text" value="01 may 2024" />
                  <button class="date-nav" type="button">&#8250;</button>
                  <span class="calendar-icon">&#128197;</span>
                </div>
              </div>

              <div class="converter-rates">
                <span>EUR</span>
                <span>GBP</span>
                <span>BTC</span>
              </div>
            </div>
          </article>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
